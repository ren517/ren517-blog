{{ define "main" }}
<article class="main-article">
    <header class="article-header">
        <h2 class="article-title">{{ .Title }}</h2>
    </header>

    <section class="article-content">
        {{ .Content }}

        {{ range .Site.Data.links }}
            <h3 class="link-category-title" style="margin-top: 2rem;">{{ .category }}</h3>
            <div class="link-wrapper" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem;">
                {{ range .links }}
                <a href="{{ .website }}" target="_blank" rel="noopener" class="link-card" style="border: 1px solid var(--card-border-color); padding: 15px; border-radius: var(--card-border-radius); background: var(--card-background); display: flex; align-items: center; text-decoration: none; color: inherit; transition: transform 0.3s ease;">
                    <div class="link-avatar" style="margin-right: 15px;">
                        <img src="{{ .image }}" alt="{{ .title }}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" onerror="this.src='/img/avatar_default.png'">
                    </div>
                    <div class="link-info">
                        <div class="link-title" style="font-weight: bold; font-size: 1.1rem;">{{ .title }}</div>
                        <div class="link-desc" style="font-size: 0.9rem; opacity: 0.8; margin-top: 4px;">{{ .description }}</div>
                    </div>
                </a>
                {{ end }}
            </div>
        {{ end }}
    </section>
</article>

<style>
    /* 简单的悬停效果 */
    .link-card:hover {
        transform: translateY(-5px);
        background-color: var(--accent-color-transparent) !important;
    }
</style>
{{ end }}
