{{ define "main" }}
<header>
    <h2 class="section-title">{{ .Title }}</h2>
    <div class="section-card">
        <div class="section-details">
            {{ .Content }}
        </div>
    </div>
</header>

{{/* 遍历数据 */}}
{{ range hugo.Data.links }}
    <h3 class="link-category-title" style="margin: 40px 0 15px 10px; font-weight: 600; font-size: 1.2rem; color: var(--card-text-color-main);">
        {{ .category | safeHTML }}
    </h3>
    
    <div class="article-list--compact" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem;">
        {{ range .links }}
        <article>
            <a href="{{ .website | safeURL }}" target="_blank" rel="noopener" style="text-decoration: none;">
                <div class="article-details" style="display: flex; align-items: center; padding: 20px; background: var(--card-background); border-radius: var(--card-border-radius); box-shadow: var(--shadow-l1); transition: transform 0.3s ease, box-shadow 0.3s ease; border: 1px solid var(--card-border-color);">
                    <div class="article-image" style="margin-right: 18px; flex-shrink: 0;">
                        <img src="{{ .image | safeURL }}" 
                             loading="lazy" 
                             style="width: 60px; height: 60px; border-radius: 12px; object-fit: cover;"
                             onerror="this.src='/img/avatar_default.png'">
                    </div>
                    <div class="article-title-wrapper" style="overflow: hidden;">
                        <h2 class="article-title" style="margin: 0; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--card-text-color-main);">
                            {{ .title | safeHTML }}
                        </h2>
                        <section class="article-preview" style="margin: 5px 0 0; font-size: 0.85rem; opacity: 0.7; color: var(--card-text-color-tertiary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;">
                            {{ .description | safeHTML }}
                        </section>
                    </div>
                </div>
            </a>
        </article>
        {{ end }}
    </div>
{{ end }}

<style>
    /* 鼠标悬停动画：卡片上移并增加阴影 */
    .article-details:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-l2);
        border-color: var(--accent-color);
    }
    /* 适配小屏幕：减少分类标题边距 */
    @media (max-width: 640px) {
        .link-category-title {
            margin: 25px 0 10px 5px !important;
        }
    }
</style>
{{ end }}
