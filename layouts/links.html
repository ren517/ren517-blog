{{ define "main" }}
<header>
    <h2 class="section-title">{{ .Title }}</h2>
    <div class="section-card">
        <div class="section-details">
            {{ .Content }}
        </div>
    </div>
</header>

{{/* 遍历数据：使用新版 hugo.Data 语法 */}}
{{ range hugo.Data.links }}
    <h3 class="link-category-title">
        {{ .category | safeHTML }}
    </h3>
    
    <div class="article-list--compact">
        {{ range .links }}
        <article>
            <a href="{{ .website | safeURL }}" target="_blank" rel="noopener" class="link-card-anchor">
                <div class="article-details">
                    <div class="article-image">
                        <img src="{{ .image | safeURL }}" 
                             loading="lazy" 
                             alt="{{ .title }}"
                             onerror="this.src='/img/avatar_default.png'">
                    </div>
                    <div class="article-title-wrapper">
                        <h2 class="article-title">
                            {{ .title | safeHTML }}
                        </h2>
                        <section class="article-preview">
                            {{ .description | safeHTML }}
                        </section>
                    </div>
                </div>
            </a>
        </article>
        {{ end }}
    </div>
{{ end }}

<style>
    /* 分类标题样式 */
    .link-category-title {
        margin: 40px 0 20px 10px;
        font-weight: 600;
        font-size: 1.4rem; /* 增大分类标题 */
        color: var(--card-text-color-main);
    }

    /* 网格布局：自动适应屏幕宽度 */
    .article-list--compact {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 1.2rem;
    }

    .link-card-anchor {
        text-decoration: none;
    }

    /* 卡片主体样式 */
    .article-list--compact .article-details {
        display: flex;
        align-items: center;
        padding: 24px; /* 增加内边距，更有呼吸感 */
        background: var(--card-background);
        border-radius: 16px; /* 更现代的大圆角 */
        box-shadow: var(--shadow-l1);
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        border: 1px solid var(--card-border-color);
        height: 100%; /* 确保卡片等高 */
    }

    /* 鼠标悬停：上移、变色、阴影加深 */
    .article-list--compact .article-details:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-l2);
        border-color: var(--accent-color);
        background: var(--card-background);
    }

    /* 头像样式 */
    .article-list--compact .article-image {
        margin-right: 20px;
        flex-shrink: 0;
    }

    .article-list--compact .article-image img {
        width: 64px; /* 略微增大头像 */
        height: 64px;
        border-radius: 12px;
        object-fit: cover;
        background-color: var(--background);
    }

    /* 标题样式：加粗加黑 */
    .article-list--compact .article-title {
        margin: 0;
        font-size: 1.25rem !important; /* 显著增大标题 */
        font-weight: 700;
        color: var(--card-text-color-main);
        line-height: 1.2;
    }

    /* 描述文字样式：增大并改善间距 */
    .article-list--compact .article-preview {
        margin: 8px 0 0;
        font-size: 1rem !important; /* 提升至 1rem，确保清晰 */
        line-height: 1.6 !important; /* 增加行高 */
        color: var(--card-text-color-tertiary);
        opacity: 0.9;
        /* 限制描述为两行，超出显示省略号 */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* 适配手机端 */
    @media (max-width: 640px) {
        .article-list--compact {
            grid-template-columns: 1fr; /* 手机端单列铺满 */
        }
        .link-category-title {
            margin: 30px 0 15px 5px !important;
            font-size: 1.2rem;
        }
        .article-list--compact .article-details {
            padding: 16px; /* 手机端缩小内边距 */
        }
    }
</style>
{{ end }}
