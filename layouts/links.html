{{ define "main" }}
<div class="links-header-container">
    <header class="links-custom-header">
        <div class="header-banner">
            <img src="/img/yqlj.jpg" alt="Banner" class="banner-img">
            <div class="banner-overlay"></div>
        </div>
        
        <div class="header-content-wrapper">
            <h2 class="section-title">{{ .Title }}</h2>
            <div class="header-description">
                {{ .Content }}
            </div>
        </div>
    </header>
</div>

{{ range hugo.Data.links }}
    <h3 class="link-category-title">{{ .category | safeHTML }}</h3>
    <div class="article-list--compact">
        {{ range .links }}
        <article>
            <a href="{{ .website | safeURL }}" target="_blank" rel="noopener" class="link-card-anchor">
                <div class="article-details">
                    <div class="article-image">
                        <img src="{{ .image | safeURL }}" loading="lazy" onerror="this.src='/img/avatar_default.png'">
                    </div>
                    <div class="article-title-wrapper">
                        <h2 class="article-title">{{ .title | safeHTML }}</h2>
                        <section class="article-preview">{{ .description | safeHTML }}</section>
                    </div>
                </div>
            </a>
        </article>
        {{ end }}
    </div>
{{ end }}

<style>
    /* --- 头部大图装修 --- */
    .links-custom-header {
        position: relative;
        margin-bottom: 40px;
        border-radius: 20px;
        background: var(--card-background);
        overflow: hidden;
        box-shadow: var(--shadow-l2);
        border: 1px solid var(--card-border-color);
        min-height: 220px; /* 保证一定高度 */
        display: flex;
        align-items: flex-end; /* 文字沉到底部 */
    }

    .header-banner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .banner-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* 调整位置：第一个值是水平，第二个值是垂直 */
    /* top: 靠顶对齐 (适合人像在图片上半部分) */
    /* center: 居中 (默认) */
    /* bottom: 靠底对齐 */
    object-position: center 60%; 
    }

    /* 遮罩层：让图片变暗一点，确保文字清晰 */
    .banner-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
        z-index: 2;
    }

    .header-content-wrapper {
        position: relative;
        z-index: 3;
        padding: 30px;
        width: 100%;
    }

    .links-custom-header .section-title {
        margin: 0;
        font-size: 2.2rem;
        font-weight: 800;
        min-height: 300px;
        color: #ffffff; /* 图片背景下，文字通常用白色 */
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .header-description {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.9);
        margin-top: 10px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* --- 列表与卡片样式保持一致 --- */
    .link-category-title {
        margin: 40px 0 20px 10px;
        font-weight: 600;
        font-size: 1.4rem;
        color: var(--card-text-color-main);
        display: flex;
        align-items: center;
    }

    .link-category-title::before {
        content: "";
        width: 4px;
        height: 1.2rem;
        background: var(--accent-color);
        margin-right: 12px;
        border-radius: 4px;
    }

    .article-list--compact {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 1.2rem;
    }

    .link-card-anchor { text-decoration: none; }

    .article-list--compact .article-details {
        display: flex;
        align-items: center;
        padding: 24px;
        background: var(--card-background);
        border-radius: 16px;
        box-shadow: var(--shadow-l1);
        transition: all 0.3s ease;
        border: 1px solid var(--card-border-color);
        height: 100%;
    }

    .article-list--compact .article-details:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-l2);
        border-color: var(--accent-color);
    }

    .article-list--compact .article-image img {
        width: 64px;
        height: 64px;
        border-radius: 12px;
        object-fit: cover;
        margin-right: 20px;
    }

    .article-list--compact .article-title {
        margin: 0;
        font-size: 1.2rem !important;
        font-weight: 700;
        color: var(--card-text-color-main);
    }

    .article-list--compact .article-preview {
        margin-top: 6px;
        font-size: 1rem !important;
        line-height: 1.5;
        color: var(--card-text-color-tertiary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    @media (max-width: 640px) {
        .links-custom-header { min-height: 180px; }
        .article-list--compact { grid-template-columns: 1fr; }
    }
</style>
{{ end }}
